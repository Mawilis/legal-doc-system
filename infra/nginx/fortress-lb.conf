/**
 * MERMAID INTEGRATION DIAGRAM:
 * graph TD
 *   A[Global Load Balancer] --> B[Africa-South-1 Cluster]
 *   A --> C[Europe-West-1 Cluster]
 *   A --> D[US-East-1 Standby]
 *   
 *   B --> B1[Node 10.0.1.10:3000]
 *   B --> B2[Node 10.0.1.11:3000]
 *   B --> B3[Node 10.0.1.12:3000]
 *   
 *   C --> C1[Node 10.0.2.10:3000]
 *   C --> C2[Node 10.0.2.11:3000]
 *   C --> C3[Node 10.0.2.12:3000]
 *   
 *   D --> D1[Node 10.0.3.10:3000]
 *   
 *   A --> E[Redis Global Cluster]
 *   E --> F[Africa Redis]
 *   E --> G[Europe Redis]
 *   E --> H[US Redis]
 *   
 *   style A fill:#f9f,stroke:#333,stroke-width:4px
 *   style B fill:#bfb,stroke:#333
 *   style C fill:#bfb,stroke:#333
 *   style D fill:#ff9,stroke:#333
 *   style E fill:#9ff,stroke:#333
