# ============================================================================
# GLOBAL CONFIGURATION
# ============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

# ============================================================================
# HTTP CORE CONFIGURATION
# ============================================================================

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # MIME Types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Format (Forensic Grade)
    log_format forensic '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       '"$http_x_forwarded_for" $request_time '
                       '$upstream_response_time $upstream_addr '
                       '$upstream_status $region $datacenter '
                       '$ssl_protocol/$ssl_cipher';

    # Access Logs (with forensic detail)
    access_log /var/log/nginx/access.log forensic buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ========================================================================
    # GLOBAL UPSTREAM CLUSTERS (Regional Load Balancing)
    # ========================================================================

    # Africa Region (South Africa - Primary)
    upstream wilsy_africa_cluster {
        zone africa_cluster 64k;
        least_conn;  # Route to least loaded node
        
        # Health check endpoint
        health_check interval=10s fails=3 passes=2 uri=/api/v1/sys/health;
        
        # Johannesburg Nodes (Primary)
        server 10.0.1.10:3000 weight=100 max_fails=3 fail_timeout=30s;
        server 10.0.1.11:3000 weight=100 max_fails=3 fail_timeout=30s;
        server 10.0.1.12:3000 weight=100 max_fails=3 fail_timeout=30s;
        
        # Cape Town Nodes (Backup within region)
        server 10.0.1.20:3000 weight=80 max_fails=3 fail_timeout=30s backup;
        server 10.0.1.21:3000 weight=80 max_fails=3 fail_timeout=30s backup;
        
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
        
        # Sticky sessions using IP hash (optional - enable if needed)
        # ip_hash;
    }

    # Europe Region (Frankfurt - GDPR Compliant)
    upstream wilsy_europe_cluster {
        zone europe_cluster 64k;
        least_conn;
        
        health_check interval=10s fails=3 passes=2 uri=/api/v1/sys/health;
        
        # Frankfurt Nodes
        server 10.0.2.10:3000 weight=100 max_fails=3 fail_timeout=30s;
        server 10.0.2.11:3000 weight=100 max_fails=3 fail_timeout=30s;
        server 10.0.2.12:3000 weight=100 max_fails=3 fail_timeout=30s;
        
        # London Nodes (Secondary)
        server 10.0.2.20:3000 weight=80 max_fails=3 fail_timeout=30s backup;
        server 10.0.2.21:3000 weight=80 max_fails=3 fail_timeout=30s backup;
        
        keepalive 32;
    }

    # US Region (Virginia - Primary US)
    upstream wilsus_east_cluster {
        zone useast_cluster 64k;
        least_conn;
        
        health_check interval=10s fails=3 passes=2 uri=/api/v1/sys/health;
        
        # Virginia Nodes
        server 10.0.3.10:3000 weight=100 max_fails=3 fail_timeout=30s;
        server 10.0.3.11:3000 weight=100 max_fails=3 fail_timeout=30s;
        server 10.0.3.12:3000 weight=100 max_fails=3 fail_timeout=30s;
        
        # Ohio Nodes (Backup)
        server 10.0.3.20:3000 weight=80 max_fails=3 fail_timeout=30s backup;
        server 10.0.3.21:3000 weight=80 max_fails=3 fail_timeout=30s backup;
        
        keepalive 32;
    }

    # Asia Region (Singapore - Future Expansion)
    upstream wilsy_asia_cluster {
        zone asia_cluster 64k;
        least_conn;
        
        health_check interval=10s fails=3 passes=2 uri=/api/v1/sys/health;
        
        # Singapore Nodes
        server 10.0.4.10:3000 weight=100 max_fails=3 fail_timeout=30s;
        server 10.0.4.11:3000 weight=100 max_fails=3 fail_timeout=30s backup;
        server 10.0.4.12:3000 weight=100 max_fails=3 fail_timeout=30s backup;
        
        # Tokyo Nodes (Backup)
        server 10.0.4.20:3000 weight=80 max_fails=3 fail_timeout=30s backup;
        
        keepalive 16;
    }

    # Global Fallback (Emergency Cluster)
    upstream wilsy_global_fallback {
        zone global_fallback 32k;
        least_conn;
        
        # All regions as backup with lower weight
        server 10.0.1.10:3000 weight=50 max_fails=2 fail_timeout=60s backup;
        server 10.0.2.10:3000 weight=50 max_fails=2 fail_timeout=60s backup;
        server 10.0.3.10:3000 weight=50 max_fails=2 fail_timeout=60s backup;
        server 10.0.4.10:3000 weight=50 max_fails=2 fail_timeout=60s backup;
    }

    # ========================================================================
    # GEO-IP MAPPING (Data Residency Enforcement)
    # ========================================================================

    # GeoIP2 Database (MaxMind)
    geoip2 /etc/nginx/geoip/GeoLite2-Country.mmdb {
        $geoip2_data_country_code source=$remote_addr country iso_code;
        $geoip2_data_continent_code source=$remote_addr continent code;
    }

    # Region mapping based on client IP
    map $geoip2_data_continent_code $target_region {
        default                 "global";
        AF                      "africa";
        EU                      "europe";
        AS                      "asia";
        NA                      "useast";
        OC                      "asia";
        SA                      "useast";
    }

    # Data residency enforcement
    map $geoip2_data_country_code $data_residency {
        default                 "GLOBAL";
        ZA                      "ZA";
        NA                      "ZA";
        KE                      "ZA";
        NG                      "ZA";
        DE                      "EU";
        FR                      "EU";
        UK                      "EU";
        US                      "US";
        CA                      "US";
        JP                      "ASIA";
        SG                      "ASIA";
        CN                      "ASIA";
    }

    # ========================================================================
    # RATE LIMITING (Global Distributed)
    # ========================================================================

    # Rate limiting zones (shared memory)
    limit_req_zone $binary_remote_addr zone=global_api:100m rate=1000r/s;
    limit_req_zone $binary_remote_addr zone=global_auth:100m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=global_search:100m rate=500r/s;
    
    # Per-tenant rate limiting (using Redis)
    limit_req_zone $http_x_tenant_id zone=tenant_api:100m rate=100r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=global_conn:100m;
    limit_conn_zone $http_x_tenant_id zone=tenant_conn:100m;

    # ========================================================================
    # SSL/TLS CONFIGURATION (Quantum Grade)
    # ========================================================================

    # SSL session cache
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ========================================================================
    # MAIN SERVER BLOCK (Global Gateway)
    # ========================================================================

    server {
        listen 80;
        listen [::]:80;
        server_name api.wilsy.os *.wilsy.os;
        
        # Redirect to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
        
        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.wilsy.os *.wilsy.os;

        # SSL Certificates
        ssl_certificate /etc/ssl/wilsy/fullchain.pem;
        ssl_certificate_key /etc/ssl/wilsy/privkey.pem;
        ssl_trusted_certificate /etc/ssl/wilsy/chain.pem;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.wilsy.os wss://api.wilsy.os" always;

        # Rate limiting
        limit_req zone=global_api burst=200 nodelay;
        limit_conn global_conn 50;

        # ====================================================================
        # GEO-ROUTING LOGIC
        # ====================================================================

        # Health check endpoint (bypass routing)
        location /health-check {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Internal health probe (for load balancers)
        location /api/v1/sys/health {
            # Route based on region header for internal checks
            set $upstream_cluster "wilsy_africa_cluster";
            
            if ($http_x_region) {
                set $upstream_cluster "wilsy_${http_x_region}_cluster";
            }
            
            proxy_pass http://$upstream_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Region $geoip2_data_continent_code;
            proxy_set_header X-Data-Residency $data_residency;
            
            # Health check specific headers
            proxy_set_header X-Health-Check "true";
            proxy_set_header X-Health-Secret "quantum_fortress_secure_probe_2026";
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ====================================================================
        # API ROUTING WITH GEO-AWARENESS
        # ====================================================================

        location /api/ {
            # Rate limiting per tenant
            limit_req zone=tenant_api burst=50 nodelay;
            limit_conn tenant_conn 20;

            # Select upstream based on client region
            set $upstream_cluster "wilsy_global_fallback";
            
            # Region-based routing
            if ($target_region = "africa") {
                set $upstream_cluster "wilsy_africa_cluster";
            }
            
            if ($target_region = "europe") {
                set $upstream_cluster "wilsy_europe_cluster";
            }
            
            if ($target_region = "useast") {
                set $upstream_cluster "wilsy_us_east_cluster";
            }
            
            if ($target_region = "asia") {
                set $upstream_cluster "wilsy_asia_cluster";
            }

            # Data residency override (for compliance)
            if ($http_x_data_residency) {
                set $data_residency $http_x_data_residency;
                set $upstream_cluster "wilsy_${http_x_data_residency}_cluster";
            }

            # Proxy to selected cluster
            proxy_pass http://$upstream_cluster;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Geo headers
            proxy_set_header X-Geo-Country $geoip2_data_country_code;
            proxy_set_header X-Geo-Continent $geoip2_data_continent_code;
            proxy_set_header X-Data-Residency $data_residency;
            proxy_set_header X-Region $target_region;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Cache control
            proxy_cache wilsy_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 302 60s;
            proxy_cache_valid 404 10s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        }

        # ====================================================================
        # STATIC ASSET SERVING
        # ====================================================================

        location /static/ {
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ====================================================================
        # METRICS EXPOSURE (Internal Only)
        # ====================================================================

        location /metrics {
            allow 10.0.0.0/8;    # Internal network
            allow 172.16.0.0/12; # Docker network
            allow 192.168.0.0/16;# Local network
            deny all;
            
            proxy_pass http://wilsy_africa_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ====================================================================
        # NGINX STATUS (Monitoring)
        # ====================================================================

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }

        # ====================================================================
        # ERROR HANDLING
        # ====================================================================

        error_page 404 /404.html;
        location = /404.html {
            root /var/www/html;
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/html;
            internal;
        }
    }

    # ========================================================================
    # REGIONAL HEALTH CHECK SERVER (Internal)
    # ========================================================================

    server {
        listen 8080;
        server_name localhost;
        
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        location /ready {
            access_log off;
            return 200 "ready\n";
        }
        
        location /stats {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }

    # ========================================================================
    # CACHE CONFIGURATION
    # ========================================================================

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=wilsy_cache:100m max_size=10g inactive=60m use_temp_path=off;

    # ========================================================================
    # GZIP COMPRESSION
    # ========================================================================

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_disable "msie6";

    # ========================================================================
    # REAL IP (for proxies)
    # ========================================================================

    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
}
