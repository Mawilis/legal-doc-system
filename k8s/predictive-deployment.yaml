apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictive-engine
  namespace: predictive
  labels:
    app: wilsy-os
    tier: sovereign-core
    version: v34.0.0
spec:
  replicas: 3 # 🛡️ Institutional Resilience: Triple Redundancy
  selector:
    matchLabels:
      app: wilsy-os
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 # 🛡️ Zero-Downtime Guarantee
  template:
    metadata:
      labels:
        app: wilsy-os
        tier: sovereign-core
    spec:
      containers:
        - name: wilsy-os-container
          image: ghcr.io/wilsonkhanyezi/wilsy-os-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000 # 📡 Master API Intake

          # ------------------------------------------------------------------
          # 🚀 SOVEREIGN RESOURCE DIMENSIONING
          # ------------------------------------------------------------------
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # ------------------------------------------------------------------
          # 🛡️ SOVEREIGN HEALTH PROBES (Self-Healing)
          # ------------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

          # ------------------------------------------------------------------
          # 🗝️ SOVEREIGN ENVIRONMENT INJECTION
          # ------------------------------------------------------------------
          envFrom:
            - secretRef:
                name: wilsy-sovereign-secrets
          env:
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

# ----------------------------------------------------------------------------
# END OF CONFIGURATION
