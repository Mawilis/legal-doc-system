apiVersion: v1
kind: Service
metadata:
  name: wilsy-os-service
  namespace: predictive
  labels:
    app: wilsy-os
    tier: sovereign-core
spec:
  type: LoadBalancer # 🛡️ Institutional Access: External IP Provisioning
  selector:
    app: wilsy-os    # 🛡️ Precise Targeting: Routes to the Singularity pods
  ports:
    - name: http
      protocol: TCP
      port: 80       # 📡 External Boardroom Intake
      targetPort: 3000 # 📡 Internal Pod Port

  # ------------------------------------------------------------------
  # 🚀 SOVEREIGN TRAFFIC POLICIES
  # ------------------------------------------------------------------
  sessionAffinity: None
  externalTrafficPolicy: Cluster # 🛡️ Resilience: Cross-node load balancing

