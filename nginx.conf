# ============================================================================
# WILSY OS 2050 - NGINX ENTERPRISE CONFIGURATION
# 10TH GENERATION | QUANTUM FORTRESS | FORTUNE 500
# ============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

# ============================================================================
# EVENT PROCESSING
# ============================================================================
events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
    accept_mutex on;
    accept_mutex_delay 100ms;
}

# ============================================================================
# HTTP CORE CONFIGURATION
# ============================================================================
http {
    # ------------------------------------------------------------------------
    # BASIC SETTINGS
    # ------------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # ------------------------------------------------------------------------
    # PERFORMANCE TUNING
    # ------------------------------------------------------------------------
    sendfile on;
    sendfile_max_chunk 512k;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Keepalive settings
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    # Client settings
    client_body_timeout 60;
    client_header_timeout 60;
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    
    # ------------------------------------------------------------------------
    # COMPRESSION
    # ------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1000;
    
    # ------------------------------------------------------------------------
    # LOGGING - FORENSIC GRADE
    # ------------------------------------------------------------------------
    log_format forensic '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       '$request_time $upstream_response_time '
                       '$connection $connection_requests '
                       '[$upstream_addr] [$upstream_status]';
    
    access_log /Library/WilsyOS/data/audit-logs/nginx-access.log forensic buffer=32k flush=5s;
    error_log /Library/WilsyOS/data/audit-logs/nginx-error.log warn;
    
    # ------------------------------------------------------------------------
    # RATE LIMITING
    # ------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=investor_limit:10m rate=10r/s;
    
    # ------------------------------------------------------------------------
    # UPSTREAM BACKENDS
    # ------------------------------------------------------------------------
    upstream wilsy-api {
        least_conn;
        server wilsy-os:3000 max_fails=3 fail_timeout=30s weight=10;
        server wilsy-os:3000 backup;  # Second instance for HA
        keepalive 32;
    }
    
    upstream investor-api {
        server wilsy-os:9096 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }
    
    # ============================================================================
    # MAIN SERVER BLOCK - HTTP REDIRECT
    # ============================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name api.wilsy.os investor.wilsy.os app.wilsy.os;
        
        # Redirect all HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }
    
    # ============================================================================
    # MAIN SERVER BLOCK - HTTPS
    # ============================================================================
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name api.wilsy.os;
        
        # ------------------------------------------------------------------------
        # SSL/TLS CONFIGURATION - ENTERPRISE GRADE
        # ------------------------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/wilsy.crt;
        ssl_certificate_key /etc/nginx/ssl/wilsy.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        
        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # ------------------------------------------------------------------------
        # API ENDPOINT
        # ------------------------------------------------------------------------
        location /api {
            limit_req zone=api_limit burst=200 nodelay;
            
            proxy_pass http://wilsy-api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }
        
        # ------------------------------------------------------------------------
        # HEALTH CHECK
        # ------------------------------------------------------------------------
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # ------------------------------------------------------------------------
        # METRICS (RESTRICTED)
        # ------------------------------------------------------------------------
        location /metrics {
            limit_req zone=investor_limit burst=20 nodelay;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            
            proxy_pass http://wilsy-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # ------------------------------------------------------------------------
        # STATIC FILES
        # ------------------------------------------------------------------------
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
        
        # ------------------------------------------------------------------------
        # DEFAULT LOCATION
        # ------------------------------------------------------------------------
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
        }
        
        # ------------------------------------------------------------------------
        # ERROR PAGES
        # ------------------------------------------------------------------------
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }
    
    # ============================================================================
    # INVESTOR PORTAL SERVER
    # ============================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name investor.wilsy.os;
        
        ssl_certificate /etc/nginx/ssl/investor.wilsy.crt;
        ssl_certificate_key /etc/nginx/ssl/investor.wilsy.key;
        
        # Same SSL settings as main server
        include /etc/nginx/ssl-config.conf;
        
        location / {
            limit_req zone=investor_limit burst=50 nodelay;
            
            proxy_pass http://investor-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Add CORS headers for investor portal
            add_header Access-Control-Allow-Origin "https://investor.wilsy.os" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        }
    }
}

