groups:
  - name: wilsy-os-alerts
    interval: 30s
    rules:
      # ⏱️ SLA BREACH ALERT
      # Fires when the p95 replay latency exceeds the 500ms investor benchmark.
      - alert: SLA_Breach
        expr: wilsy_latency_telemetry_replay_latency{tenantId="GLOBAL_ROOT", quantile="0.95"} > 500
        for: 1m
        labels:
          severity: critical
          system: telemetry
          impact: high
        annotations:
          summary: "🏛️ WILSY OS: SLA Breach Detected"
          description: "Critical Latency Anomaly: Replay p95 latency is {{ $value }}ms, exceeding the 500ms threshold for 1 minute."

      # ⚖️ COMPLIANCE RATIO ALERT
      # Fires when the mathematical ratio of verified identities drops below 90%.
      - alert: Compliance_Breach
        expr: wilsy_compliance_ratio{tenantId="GLOBAL_ROOT"} < 90
        for: 2m
        labels:
          severity: critical
          system: compliance
          impact: boardroom_escalation
        annotations:
          summary: "🏛️ WILSY OS: Compliance Ratio Breach"
          description: "Regulatory Alert: Global compliance ratio has dropped to {{ $value }}%. Immediate audit required."

      # 🔍 FORENSIC SEAL FRACTURE ALERT
      # Fires immediately upon detection of an invalid forensic seal.
      - alert: Invalid_Seal_Detected
        expr: wilsy_counter_forensics_errors{tenantId="GLOBAL_ROOT"} > 0
        for: 10s
        labels:
          severity: emergency
          system: forensics
          impact: forensic_integrity
        annotations:
          summary: "🏛️ WILSY OS: Forensic Seal Fracture"
          description: "Security Anomaly: Invalid cryptographic seal detected in the forensic chain. Forensic finality compromised."

      # 💰 REVENUE BREAKER ALERT
      # Fires when revenue stream errors are detected at the API or DB layer.
      - alert: Revenue_Breaker_Alert
        expr: wilsy_counter_revenue_errors{tenantId="GLOBAL_ROOT"} > 0
        for: 1m
        labels:
          severity: critical
          system: revenue
          impact: capital_flow
        annotations:
          summary: "🏛️ WILSY OS: Revenue Breaker Active"
          description: "Financial Anomaly: Revenue stream breaker triggered. Capital inflow monitoring currently degraded."

      # 🖥️ NUCLEUS HEALTH ALERT
      # Fires if the system load average indicates hardware saturation.
      - alert: Nucleus_Load_High
        expr: wilsy_system_load > 2.0
        for: 5m
        labels:
          severity: warning
          system: nucleus
        annotations:
          summary: "🏛️ WILSY OS: Nucleus Saturation"
          description: "Hardware Warning: System load is at {{ $value }}. Singularity stability monitored."
