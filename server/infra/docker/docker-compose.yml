# WILSY OS: DOCKER PRODUCTION CONFIGURATION
# Self-healing container orchestration

version: '3.8'

services:
  wilsy-server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    image: wilsy-os/server:latest
    container_name: wilsy-server
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9090:9090"
      - "9095:9095"
      - "9096:9096"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGODB_URI=mongodb://mongodb:27017/wilsy
      - INTERNAL_HEALTH_SECRET=${INTERNAL_HEALTH_SECRET}
    env_file:
      - ../../.env
    volumes:
      - ../../logs:/app/logs
      - ../../storage:/app/storage
      - ../../models:/app/models
    depends_on:
      - redis
      - mongodb
    networks:
      - wilsy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Self-healing healthcheck
    healthcheck:
      test: ["CMD", "node", "scripts/recovery-sentinel.js", "docker-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  redis:
    image: redis:7-alpine
    container_name: wilsy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - wilsy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:6-jammy
    container_name: wilsy-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=wilsy
    networks:
      - wilsy-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: wilsy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ../../public:/usr/share/nginx/html
    depends_on:
      - wilsy-server
    networks:
      - wilsy-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  recovery-sentinel:
    image: wilsy-os/server:latest
    container_name: wilsy-recovery
    restart: unless-stopped
    command: node scripts/recovery-sentinel.js start 30000
    environment:
      - NODE_ENV=production
      - INTERNAL_HEALTH_SECRET=${INTERNAL_HEALTH_SECRET}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - PAGERDUTY_INTEGRATION_KEY=${PAGERDUTY_INTEGRATION_KEY}
    env_file:
      - ../../.env
    volumes:
      - ../../logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - wilsy-server
    networks:
      - wilsy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: wilsy-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - wilsy-network

  grafana:
    image: grafana/grafana:latest
    container_name: wilsy-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - wilsy-network

volumes:
  redis-data:
  mongodb-data:
  prometheus-data:
  grafana-data:

networks:
  wilsy-network:
    driver: bridge
