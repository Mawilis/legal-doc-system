apiVersion: apps/v1
kind: Deployment
metadata:
  name: wilsy-os-predictive
  namespace: wilsy-os
  labels:
    app: wilsy-os
    component: predictive-engine
    version: v3.0.0
    managed-by: kubectl
  annotations:
    description: 'WILSY OS Predictive Analytics Engine'
    prometheus.io/scrape: 'true'
    prometheus.io/port: '4000'
    prometheus.io/path: '/api/predict/metrics'
    fluxcd.io/ignore: 'false'
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wilsy-os
      component: predictive-engine
  template:
    metadata:
      labels:
        app: wilsy-os
        component: predictive-engine
        version: v3.0.0
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: 'runtime/default'
        container.apparmor.security.beta.kubernetes.io/wilsy-os: 'runtime/default'
    spec:
      serviceAccountName: wilsy-os-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: predictive-engine
          image: ghcr.io/wilsy-os/predictive-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
            - name: metrics
              containerPort: 4001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: wilsy-os-config
            - secretRef:
                name: wilsy-os-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          resources:
            requests:
              cpu: '2'
              memory: '2Gi'
            limits:
              cpu: '4'
              memory: '4Gi'
          volumeMounts:
            - name: snapshots
              mountPath: /app/snapshots
            - name: models
              mountPath: /app/models
            - name: tmp
              mountPath: /tmp
            - name: timezone
              mountPath: /etc/localtime
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/predict/health
              port: 4000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/predict/health
              port: 4000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/predict/health
              port: 4000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 10']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
      volumes:
        - name: snapshots
          persistentVolumeClaim:
            claimName: wilsy-os-snapshots-pvc
        - name: models
          persistentVolumeClaim:
            claimName: wilsy-os-models-pvc
        - name: tmp
          emptyDir: {}
        - name: timezone
          hostPath:
            path: /etc/localtime
            type: File
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - wilsy-os
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - compute-optimized
      tolerations:
        - key: 'dedicated'
          operator: 'Equal'
          value: 'ml-workloads'
          effect: 'NoSchedule'
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: wilsy-os
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wilsy-os-sa
  namespace: wilsy-os
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/wilsy-os-role
automountServiceAccountToken: true
