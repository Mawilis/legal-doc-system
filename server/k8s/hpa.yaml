apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wilsy-os-hpa
  namespace: wilsy-os
  labels:
    app: wilsy-os
    component: predictive-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wilsy-os-predictive
  minReplicas: 5
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  - type: Pods
    pods:
      metric:
        name: requests_per_second
      target:
        type: AverageValue
        averageValue: 1000
  - type: Object
    object:
      metric:
        name: prediction_queue_length
      describedObject:
        apiVersion: v1
        kind: Service
        name: wilsy-os-service
      target:
        type: Value
        value: 100
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
