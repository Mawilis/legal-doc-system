apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wilsy-os-ingress
  namespace: wilsy-os
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "r=1000/m"
    nginx.ingress.kubernetes.io/rate-limit-zone: "wilsy-os"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.wilsyos.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
spec:
  tls:
  - hosts:
    - api.wilsyos.com
    secretName: wilsy-os-tls
  rules:
  - host: api.wilsyos.com
    http:
      paths:
      - path: /api/predict
        pathType: Prefix
        backend:
          service:
            name: wilsy-os-service
            port:
              number: 80
      - path: /health
        pathType: Exact
        backend:
          service:
            name: wilsy-os-service
            port:
              number: 80
