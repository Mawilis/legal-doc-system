apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wilsy-os-network-policy
  namespace: wilsy-os
spec:
  podSelector:
    matchLabels:
      app: wilsy-os
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: wilsy-os
    ports:
    - protocol: TCP
      port: 4000
    - protocol: TCP
      port: 4001
  egress:
  - to:
    - namespaceSelector: {}
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
