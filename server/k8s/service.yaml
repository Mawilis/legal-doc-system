apiVersion: v1
kind: Service
metadata:
  name: wilsy-os-service
  namespace: wilsy-os
  labels:
    app: wilsy-os
    component: predictive-engine
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-connection-draining-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-connection-draining-timeout: "60"
spec:
  selector:
    app: wilsy-os
    component: predictive-engine
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 4000
  - name: https
    protocol: TCP
    port: 443
    targetPort: 4000
  - name: metrics
    protocol: TCP
    port: 4001
    targetPort: 4001
  type: LoadBalancer
  externalTrafficPolicy: Local
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: wilsy-os-headless
  namespace: wilsy-os
  labels:
    app: wilsy-os
    component: predictive-engine
spec:
  clusterIP: None
  selector:
    app: wilsy-os
    component: predictive-engine
  ports:
  - name: http
    port: 4000
