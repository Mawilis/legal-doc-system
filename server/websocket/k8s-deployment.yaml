apiVersion: apps/v1
kind: Deployment
metadata:
  name: wilsy-os-websocket
  namespace: wilsy-os
  labels:
    app: wilsy-os
    component: websocket
    tier: realtime
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wilsy-os
      component: websocket
  template:
    metadata:
      labels:
        app: wilsy-os
        component: websocket
        tier: realtime
    spec:
      containers:
      - name: websocket
        image: wilsy-os/websocket:latest
        ports:
        - containerPort: 3001
          name: ws
        - containerPort: 9090
          name: metrics
        env:
        - name: NODE_ENV
          value: "production"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: redis-config
              key: host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: redis-config
              key: port
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        - name: CORS_ORIGINS
          value: "https://app.wilsyos.com,https://admin.wilsyos.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wilsy-os-websocket
  namespace: wilsy-os
  labels:
    app: wilsy-os
    component: websocket
spec:
  selector:
    app: wilsy-os
    component: websocket
  ports:
  - name: ws
    port: 3001
    targetPort: 3001
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wilsy-os-websocket-hpa
  namespace: wilsy-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wilsy-os-websocket
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: websocket-config
  namespace: wilsy-os
data:
  WS_PING_INTERVAL: "30000"
  WS_PING_TIMEOUT: "10000"
  WS_MAX_PAYLOAD: "1048576"
  WS_MAX_CONNECTIONS_PER_IP: "100"
  WS_RATE_LIMIT_MESSAGES: "60"
  WS_RATE_LIMIT_CONNECTIONS: "10"
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wilsy-os-websocket
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: wilsy-os
      component: websocket
  endpoints:
  - port: metrics
    interval: 30s
